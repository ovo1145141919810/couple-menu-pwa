name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Privacy check
        run: npm run check:privacy
      - name: Production configuration check
        run: npm run check:production
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:run
      - name: Production build
        run: npm run build
