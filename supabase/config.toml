project_id = "couple-menu-pwa"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
major_version = 17

[studio]
enabled = true

[auth]
enabled = true
site_url = "https://ovo1145141919810.github.io/couple-menu-pwa/"
additional_redirect_urls = ["http://localhost:5173/**"]
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
# Keep the email/password provider enabled for the two existing users.
# Global auth.enable_signup above remains false, so public registration stays closed.
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true
file_size_limit = "12MiB"

[storage.vector]
enabled = false
